<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Valley Trail Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f7f7f7;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        button {
            margin: 5px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            margin: 8px 0;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Silicon Valley Trail Game</h1>

<div class="card">
    <button onclick="startGame()">Start New Game</button>
    <div id="message"></div>
</div>

<div class="card">
    <h2>Game State</h2>
    <div id="gameState">No game started yet.</div>
</div>

<div class="card">
    <h2>Actions</h2>
    <div class="actions">
        <button onclick="performAction('travel')">Travel</button>
        <button onclick="performAction('rest')">Rest</button>
        <button onclick="performAction('work')">Work on Product</button>
        <button onclick="performAction('marketing')">Marketing Push</button>
    </div>
</div>

<script>
    let currentGameId = null;

    function renderGame(game) {
        document.getElementById("gameState").innerHTML = `
                <div class="stat"><strong>Game ID:</strong> ${game.id}</div>
                <div class="stat"><strong>Day:</strong> ${game.dayNumber}</div>
                <div class="stat"><strong>Location Index:</strong> ${game.currentLocationIndex}</div>
                <div class="stat"><strong>Cash:</strong> ${game.cash}</div>
                <div class="stat"><strong>Morale:</strong> ${game.morale}</div>
                <div class="stat"><strong>Coffee:</strong> ${game.coffee}</div>
                <div class="stat"><strong>Hype:</strong> ${game.hype}</div>
                <div class="stat"><strong>Bugs:</strong> ${game.bugs}</div>
                <div class="stat"><strong>Progress:</strong> ${game.progress}%</div>
                <div class="stat"><strong>Status:</strong> ${game.status}</div>
            `;
    }

    async function startGame() {
        try {
            const response = await fetch('/api/v1/games', {
                method: 'POST'
            });

            const game = await response.json();
            currentGameId = game.id;
            renderGame(game);
            document.getElementById("message").textContent = "New game started!";
        } catch (error) {
            document.getElementById("message").textContent = "Failed to start game.";
            console.error(error);
        }
    }

    async function performAction(action) {
        if (!currentGameId) {
            document.getElementById("message").textContent = "Start a game first.";
            return;
        }

        try {
            const response = await fetch(`/api/v1/games/${currentGameId}/${action}`, {
                method: 'POST'
            });

            const game = await response.json();
            renderGame(game);

            if (game.status === "WON") {
                document.getElementById("message").textContent = "You won the game!";
            } else if (game.status === "LOST") {
                document.getElementById("message").textContent = "You lost the game.";
            } else {
                document.getElementById("message").textContent = `Action "${action}" completed.`;
            }
        } catch (error) {
            document.getElementById("message").textContent = `Failed to perform action: ${action}`;
            console.error(error);
        }
    }
</script>
</body>
</html>
